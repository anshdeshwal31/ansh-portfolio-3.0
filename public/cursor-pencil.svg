<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <g transform="rotate(-45 16 16)">
    <!-- Pencil body -->
    <rect x="12" y="4" width="8" height="18" fill="#c0392b" />
    <!-- Pencil wood tip -->
    <polygon points="12,22 20,22 16,28" fill="#e2c8a4" />
    <!-- Pencil lead -->
    <polygon points="15,26.5 17,26.5 16,28" fill="#c0392b" />
    <!-- Metal band -->
    <rect x="12" y="4" width="8" height="3" fill="#bdc3c7" />
    <!-- Eraser -->
    <path d="M12,4 L20,4 L20,2 C20,1 19,0 16,0 C13,0 12,1 12,2 Z" fill="#e74c3c" />
    <!-- Shadow/Highlight on body -->
    <rect x="16" y="7" width="2" height="15" fill="#a93226" />
    <rect x="13" y="7" width="1" height="15" fill="#d9534f" />
  </g>
</svg>
